<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prode Mundial 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="landing">
    <div style="font-size:52px;margin-bottom:12px;">⚽</div>
    <h1>Prode <span>Mundial 2026</span></h1>
    <p>Predecí los resultados de la fase de grupos</p>

    <div class="landing-card">
      <h2 id="formTitle">Ingresá tu alias</h2>
      <p id="formSubtitle" style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
        Si es tu primera vez, elegí un alias y contraseña. Si ya jugaste, ingresá los mismos datos.
      </p>

      <div class="form-group">
        <label>Alias (visible en el ranking)</label>
        <input type="text" id="aliasInput" placeholder="Ej: Luci, El Flaco..." maxlength="20" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="pwInput" placeholder="Mínimo 4 caracteres" maxlength="40">
      </div>

      <button class="btn btn-primary" id="enterBtn" onclick="entrar()">Entrar al prode →</button>
      <div id="error" style="color:#f85149;font-size:13px;margin-top:10px;display:none;"></div>
    </div>

    <div style="margin-top:20px;">
      <a href="leaderboard.html" style="color:var(--text-muted);font-size:13px;text-decoration:none;">Ver ranking →</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const aliasInput = document.getElementById("aliasInput");
    const pwInput    = document.getElementById("pwInput");
    const errorEl    = document.getElementById("error");
    const enterBtn   = document.getElementById("enterBtn");

    // Si ya tiene sesión guardada en este dispositivo, entrar directo
    const saved = localStorage.getItem("prode_alias");
    if (saved) window.location.href = "predictions.html";

    [aliasInput, pwInput].forEach(el => {
      el.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });
    });

    async function hashPassword(pw) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function entrar() {
      hideError();
      const alias = aliasInput.value.trim();
      const pw    = pwInput.value;

      if (!alias || alias.length < 2) { showError("El alias debe tener al menos 2 caracteres."); return; }
      if (!pw || pw.length < 4)       { showError("La contraseña debe tener al menos 4 caracteres."); return; }

      enterBtn.disabled = true;
      enterBtn.textContent = "Verificando...";

      try {
        const hash    = await hashPassword(pw);
        const userRef = db.collection("users").doc(alias);
        const snap    = await userRef.get();

        if (!snap.exists) {
          // Usuario nuevo → crear
          await userRef.set({
            alias,
            passwordHash: hash,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          localStorage.setItem("prode_alias", alias);
          window.location.href = "predictions.html";

        } else {
          // Usuario existente → verificar contraseña
          const data = snap.data();
          if (data.passwordHash !== hash) {
            showError("Contraseña incorrecta.");
            enterBtn.disabled = false;
            enterBtn.textContent = "Entrar al prode →";
            return;
          }
          localStorage.setItem("prode_alias", alias);
          window.location.href = "predictions.html";
        }

      } catch (err) {
        showError("Error al conectar. Revisá tu conexión.");
        enterBtn.disabled = false;
        enterBtn.textContent = "Entrar al prode →";
        console.error(err);
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }
    function hideError() {
      errorEl.style.display = "none";
    }
  </script>
</body>
</html>
